<!DOCTYPE html>
<html lang="es">
<head>

  <title>Semana Santa Almeria 2026 - Mapa de Procesiones</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark: #1A1A1A;
      --bg-sidebar: #212121;
      --bg-card: #2D2D2D;
      --bg-card-hover: #3D3D3D;
      --bg-elevated: #3D3D3D;
      --gold: #FF6B35;
      --gold-light: #FF6B35;
      --teal: #00D4AA;
      --text: #FFFFFF;
      --text-muted: #777777;
      --sidebar-w: 380px;
      --popup-bg: rgba(33,33,33,0.95);
      --popup-border: rgba(255,255,255,0.08);
      --legend-bg: rgba(33,33,33,0.92);
      --legend-border: rgba(255,255,255,0.06);
      --border-subtle: rgba(255,255,255,0.06);
      --checkpoint-border: rgba(255,255,255,0.7);
      --checkpoint-text: #000;
    }

    :root.light {
      --bg-dark: #F0F0EC;
      --bg-sidebar: #FFFFFF;
      --bg-card: #F0F0EC;
      --bg-card-hover: #E4E4E0;
      --bg-elevated: #E4E4E0;
      --gold: #FF6B35;
      --gold-light: #FF6B35;
      --teal: #00A88A;
      --text: #1A1A1A;
      --text-muted: #777777;
      --popup-bg: rgba(255,255,255,0.95);
      --popup-border: rgba(0,0,0,0.1);
      --legend-bg: rgba(255,255,255,0.92);
      --legend-border: rgba(0,0,0,0.08);
      --border-subtle: rgba(0,0,0,0.08);
      --checkpoint-border: rgba(0,0,0,0.4);
      --checkpoint-text: #fff;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg-dark);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    #app { display: flex; height: 100vh; }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-subtle);
      z-index: 1000;
      transition: transform 0.3s ease;
    }

    #sidebar-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    #sidebar-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    #theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text);
      width: 34px; height: 34px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #theme-toggle:hover { background: var(--bg-elevated); }

    #sidebar-header p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Day tabs */
    #day-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .day-tab {
      padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: none;
      border-radius: 16px;
      color: var(--text-muted);
      background: var(--bg-card);
      transition: all 0.2s;
      text-align: center;
    }

    .day-tab:hover { color: var(--text); background: var(--bg-elevated); }

    .day-tab.active {
      color: #FFFFFF;
      background: var(--gold);
      border-bottom-color: transparent;
    }

    .day-tab .tab-date {
      display: block;
      font-size: 8px;
      font-weight: 300;
      margin-top: 2px;
      opacity: 0.7;
    }

    .day-tab-all {
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Procession list */
    #procession-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,107,53,0.3) transparent;
    }

    .procession-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      border-left: 4px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .procession-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0px;
      border-radius: 16px 0 0 16px;
    }

    .procession-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-subtle);
      border-left-color: rgba(255,107,53,0.4);
      transform: translateX(2px);
    }

    .procession-card.active {
      border-left-color: var(--gold);
      background: rgba(255,107,53,0.06);
      border-color: rgba(255,107,53,0.15);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }

    .card-name {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      padding-left: 8px;
      color: var(--text);
    }

    .card-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      margin-left: 8px;
    }

    .card-details {
      padding-left: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-details .church-name {
      font-weight: 500;
      color: var(--text-muted);
    }

    .card-day-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-left: 8px;
      margin-bottom: 4px;
      opacity: 0.7;
    }

    /* Map */
    #map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading h2 {
      font-family: 'Oswald', sans-serif;
      color: var(--text);
      font-size: 28px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    #loading p { color: var(--text-muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,107,53,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }


    /* Mobile toggle */
    #sidebar-toggle {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 1001;
      background: var(--bg-sidebar);
      border: 1px solid var(--gold);
      color: var(--gold);
      width: 40px; height: 40px;
      border-radius: 16px;
      font-size: 20px;
      cursor: pointer;
    }

    /* Legend on map */
    .map-legend {
      background: var(--legend-bg);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 12px 14px;
      border: 1px solid var(--legend-border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.8;
      max-height: 300px;
      overflow-y: auto;
    }

    .map-legend h4 {
      font-family: 'Oswald', sans-serif;
      color: var(--gold);
      margin-bottom: 6px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 1px 0;
    }

    .legend-item:hover { color: var(--text); }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 16px;
      flex-shrink: 0;
    }

    /* Info popup */
    .leaflet-popup-content-wrapper {
      background: var(--popup-bg) !important;
      color: var(--text) !important;
      border: 1px solid var(--popup-border) !important;
      border-radius: 16px !important;
      backdrop-filter: blur(8px);
    }

    .leaflet-popup-tip { background: var(--popup-bg) !important; }

    .popup-title {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .popup-info { font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6; }
    .popup-info strong { color: var(--teal); }

    /* Checkpoint markers */
    .checkpoint-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px; height: 18px;
      border-radius: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 700;
      color: var(--checkpoint-text);
      border: 1.5px solid var(--checkpoint-border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      line-height: 1;
    }

    .leaflet-tooltip.checkpoint-tooltip {
      background: var(--legend-bg);
      color: var(--text);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 4px 8px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .leaflet-tooltip.checkpoint-tooltip::before {
      border-top-color: var(--legend-bg);
    }

    /* Custom marker */
    .church-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      font-size: 12px;
      line-height: 1;
    }

    @media (max-width: 768px) {
      #sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        z-index: 1000;
      }
      #sidebar.open { transform: translateX(0); }
      #sidebar-toggle { display: flex; align-items: center; justify-content: center; }
      :root { --sidebar-w: 320px; }
    }
  </style>
</head>

      avdaLosAngeles:'Avda. Los Angeles', sierraGredos:'C/ Sierra Gredos',
      sierraAlhamilla1:'C/ Sierra Alhamilla', sierraBacares:'C/ Sierra Bacares',
      sierraGador:'C/ Sierra Gador', sierraFondon1:'C/ Sierra Fondon',
      sierraLaujar:'C/ Sierra Laujar', sierraMonteagud:'C/ Sierra Monteagud',
      sierraTabernas:'C/ Sierra Tabernas', limoneros:'C/ Limoneros', padreMendez:'Avda. Padre Mendez',
      alcazar:'C/ El Alcazar', calzadaCastro:'C/ Calzada Castro', drGregorioMaranon:'C/ Dr. G. Maranon',
      pacoAquino:'C/ Paco Aquino', santosZarate:'C/ Santos Zarate',
      hospital:'C/ Hospital', duendes:'C/ Duendes', rondaBeatoDiego:'Ronda Beato Diego',
      velazquez:'C/ Velazquez', joseAngelValente:'C/ J.A. Valente', arraez:'C/ Arraez',
      juez:'C/ Juez', gerona:'C/ Gerona', arapiles:'C/ Arapiles', juanPerezPerez:'C/ Juan Perez',
      reinaRegente:'C/ Reina Regente', noria:'C/ Noria', ramblaAlfareros:'Rambla Alfareros',
      losPicos:'C/ Los Picos', artesDeArcos:'C/ Artes de Arcos', plzCarmen:'Plz. del Carmen',
      posito:'C/ Posito', arcoAyuntamiento:'Arco Ayuntamiento', plzConstitucion:'Plz. Constitucion',
      marin:'C/ Marin', triunfo:'C/ Triunfo', murcia:'C/ Murcia', silencioSt:'C/ Silencio',
      joaquinPeralta:'C/ Joaquin Peralta', manuelHazana:'C/ Manuel Hazana', olivo:'C/ Olivo',
      ctraNijar:'Ctra. Nijar', staMariaMagdalena:'Igl. Sta Maria Magdalena',
    };
    // Build reverse lookup from coords → name
    for (const [key, coords] of Object.entries(P)) {
      const k = `${coords[0].toFixed(4)},${coords[1].toFixed(4)}`;
      P_NAMES[k] = NAME_MAP[key] || key;
    }
    function getPointName(coord) {
      const k = `${coord[0].toFixed(4)},${coord[1].toFixed(4)}`;
      return P_NAMES[k] || null;
    }





    // ─── FUNCTIONS ───────────────────────────────────────────

    function createChurchIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div class="church-marker" style="background:${color};width:22px;height:22px;">&#9769;</div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });
    }

    function getPopupContent(proc) {
      const day = DAYS.find(d => d.id === proc.day);
      return `
        <div class="popup-title">${proc.name}</div>
        <div class="popup-info">
          <strong>${day?.fullName || day?.name}</strong> &mdash; ${day?.date}<br>
          &#9719; Salida: <strong>${proc.startTime}h</strong> &mdash; Recogida: <strong>${proc.endTime}h</strong><br>
          &#9962; ${proc.church}<br>
          &#127968; Barrio: ${proc.neighborhood}
        </div>
      `;
    }



    function drawRoute(proc, coords, isHighlighted = false) {
      const weight = isHighlighted ? 6 : 3;
      const opacity = isHighlighted ? 0.95 : 0.6;
      const segments = BAKED.segments && BAKED.segments[proc.id];

      // If we have segment data, draw each segment with its style
      if (segments && segments.length > 0) {
        const group = L.layerGroup();
        for (const seg of segments) {
          const opts = {
            color: proc.color,
            weight: weight,
            opacity: opacity,
            lineJoin: 'round',
            lineCap: 'round',
          };
          if (seg.type === 'straight') {
            opts.dashArray = '6, 8';
            opts.opacity = opacity * 0.7;
          }
          const line = L.polyline(seg.points, opts);
          line.bindPopup(getPopupContent(proc), { maxWidth: 280 });
          line.on('click', () => selectProcession(proc.id));
          group.addLayer(line);
        }
        return group;
      }

      // Fallback: single polyline (old data format)
      const polyline = L.polyline(coords, {
        color: proc.color,
        weight: weight,
        opacity: opacity,
        lineJoin: 'round',
        lineCap: 'round'
      });

      polyline.bindPopup(getPopupContent(proc), { maxWidth: 280 });
      polyline.on('click', () => selectProcession(proc.id));

      return polyline;
    }

    function drawMarker(proc) {
      const start = proc.waypoints[0];
      const marker = L.marker(start, { icon: createChurchIcon(proc.color) });
      marker.bindPopup(getPopupContent(proc), { maxWidth: 280 });
      marker.on('click', () => selectProcession(proc.id));
      return marker;
    }

    function drawCheckpoints(proc) {
      const group = L.layerGroup();
      const seen = new Set();
      let num = 0;
      proc.waypoints.forEach((wp) => {
        const key = `${wp[0].toFixed(4)},${wp[1].toFixed(4)}`;
        if (seen.has(key)) return; // skip duplicates
        seen.add(key);
        num++;
        const name = getPointName(wp);
        const icon = L.divIcon({
          className: '',
          html: `<div class="checkpoint-marker" style="background:#FF6B35;">${num}</div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });
        const m = L.marker(wp, { icon, interactive: true });
        if (name) {
          m.bindTooltip(`<strong>${num}</strong> ${name}`, {
            className: 'checkpoint-tooltip',
            direction: 'top',
            offset: [0, -12]
          });
        }
        group.addLayer(m);
      });
      return group;
    }

    function drawComputedCheckpoints(proc) {
      const group = L.layerGroup();
      const route = proc._computedWaypoints || [];
      const names = proc._computedNames || [];

      route.forEach((wp, idx) => {
        const label = names[idx] || `Punto ${idx + 1}`;
        const icon = L.divIcon({
          className: '',
          html: `<div class="checkpoint-marker" style="background:#FF6B35;">${idx + 1}</div>`,
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        });
        const m = L.marker(wp, { icon, interactive: true });
        m.bindTooltip(`<strong>${idx + 1}</strong> ${label}`, {
          className: 'checkpoint-tooltip',
          direction: 'top',
          offset: [0, -12]
        });
        group.addLayer(m);
      });
      return group;
    }

    function selectProcession(id) {
      if (activeProcession === id) {
        activeProcession = null;
      } else {
        activeProcession = id;
      }
      updateDisplay();
    }

    function selectDay(dayId) {
      activeDay = dayId;
      activeProcession = null;
      renderDayTabs();
      updateDisplay();
      updateLegend();
      renderCards();
    }

    function updateDisplay() {
      PROCESSIONS.forEach(proc => {
        const layer = routeLayers[proc.id];
        const marker = markerLayers[proc.id];
        const cps = checkpointLayers[proc.id];
        if (!layer) return;

        const dayMatch = activeDay === 'all' || proc.day === activeDay;
        const isActive = activeProcession === proc.id;

        // Checkpoints: only visible when this procession is active
        if (cps) {
          if (isActive) { map.addLayer(cps); } else { map.removeLayer(cps); }
        }

        function applyStyle(lyr, style) {
          if (lyr.setStyle) lyr.setStyle(style);
          else if (lyr.eachLayer) lyr.eachLayer(l => { if (l.setStyle) l.setStyle(style); });
        }

        if (!dayMatch) {
          applyStyle(layer, { opacity: 0, weight: 0 });
          if (marker) marker.setOpacity(0);
          return;
        }

        const dColor = getDisplayColor(proc);
        // Update marker icon color
        if (marker) marker.setIcon(createChurchIcon(dColor));

        if (activeProcession) {
          if (isActive) {
            applyStyle(layer, { color: dColor, weight: 6, opacity: 0.95 });
            if (layer.bringToFront) layer.bringToFront();
            else if (layer.eachLayer) layer.eachLayer(l => { if (l.bringToFront) l.bringToFront(); });
            if (marker) { marker.setOpacity(1); marker.setZIndexOffset(1000); }
          } else {
            applyStyle(layer, { color: dColor, weight: 2, opacity: 0.15 });
            if (marker) marker.setOpacity(0.2);
          }
        } else {
          applyStyle(layer, { color: dColor, weight: 3.5, opacity: 0.65 });
          if (marker) marker.setOpacity(0.85);
        }
      });

      // Fit bounds if a procession is active
      function getLayerBounds(lyr) {
        if (lyr.getBounds) return lyr.getBounds();
        const b = L.latLngBounds([]);
        if (lyr.eachLayer) lyr.eachLayer(l => { if (l.getBounds) b.extend(l.getBounds()); });
        return b;
      }
      if (activeProcession && routeLayers[activeProcession]) {
        const b = getLayerBounds(routeLayers[activeProcession]);
        if (b.isValid()) map.fitBounds(b.pad(0.15));
      } else if (activeDay !== 'all') {
        const bounds = L.latLngBounds([]);
        PROCESSIONS.filter(p => p.day === activeDay).forEach(p => {
          if (routeLayers[p.id]) bounds.extend(getLayerBounds(routeLayers[p.id]));
        });
        if (bounds.isValid()) map.fitBounds(bounds.pad(0.1));
      }

      // Update card states
      document.querySelectorAll('.procession-card').forEach(card => {
        card.classList.toggle('active', card.dataset.id === activeProcession);
      });
    }

    function renderDayTabs() {
      const container = document.getElementById('day-tabs');
      container.innerHTML = DAYS.map(day => `
        <div class="day-tab ${day.id === 'all' ? 'day-tab-all' : ''} ${day.id === activeDay ? 'active' : ''}"
             onclick="selectDay('${day.id}')">
          ${day.name}
          ${day.date ? `<span class="tab-date">${day.date}</span>` : ''}
        </div>
      `).join('');
    }

    function renderCards() {
      const container = document.getElementById('procession-list');
      const filtered = activeDay === 'all' ? PROCESSIONS : PROCESSIONS.filter(p => p.day === activeDay);

      let lastDay = '';
      let html = '';
      let procIndex = 0;

      filtered.forEach(proc => {
        const day = DAYS.find(d => d.id === proc.day);
        if (activeDay === 'all' && proc.day !== lastDay) {
          lastDay = proc.day;
          html += `<div style="padding:10px 8px 4px;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:${day.color};text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border-subtle);margin-bottom:6px;">
            ${day.fullName || day.name} <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);font-weight:400;text-transform:none;">${day.date}</span>
          </div>`;
        }

        const dColor = getDisplayColor(proc);
        procIndex++;

        html += `
          <div class="procession-card ${activeProcession === proc.id ? 'active' : ''}"
               data-id="${proc.id}"
               onclick="selectProcession('${proc.id}')"
               style="--card-color:${dColor};">
            <div class="card-header">
              <div class="card-name">${proc.shortName}</div>
              <div class="card-time" style="color:${dColor};">${proc.startTime} - ${proc.endTime}</div>
            </div>
            <div class="card-details">
              <div class="church-name">&#9962; ${proc.church}</div>
              <div>&#127968; ${proc.neighborhood}</div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // ─── LEGEND ──────────────────────────────────────────────
    let legendControl = null;
    function addLegend() {
      legendControl = L.control({ position: 'bottomright' });
      legendControl.onAdd = function() {
        const div = L.DomUtil.create('div', 'map-legend');
        div.id = 'legend-content';
        return div;
      };
      legendControl.addTo(map);
      updateLegend();
    }

    function updateLegend() {
      const div = document.getElementById('legend-content');
      if (!div) return;

      if (activeDay === 'all') {
        div.innerHTML = `<h4>Dias</h4>` +
          DAYS.filter(d => d.id !== 'all').map(d =>
            `<div class="legend-item" onclick="selectDay('${d.id}')">
              <span class="legend-dot" style="background:${d.color}"></span>
              <span style="color:var(--text);">${d.fullName || d.name}</span>
            </div>`
          ).join('');
      } else {
        const day = DAYS.find(d => d.id === activeDay);
        const dayProcs = PROCESSIONS.filter(p => p.day === activeDay);
        div.innerHTML = `<h4>${day.fullName || day.name}</h4>` +
          dayProcs.map((proc, i) =>
            `<div class="legend-item" onclick="selectProcession('${proc.id}')">
              <span class="legend-dot" style="background:${DISTINCT_PALETTE[i % DISTINCT_PALETTE.length]}"></span>
              <span style="color:var(--text);">${proc.shortName}</span>
            </div>`
          ).join('');
      }
    }

    // ─── THEME ────────────────────────────────────────────────
    function applyTheme(theme) {
      const root = document.documentElement;
      if (theme === 'light') {
        root.classList.add('light');
        document.getElementById('theme-icon').textContent = '🌙';
      } else {
        root.classList.remove('light');
        document.getElementById('theme-icon').textContent = '☀️';
      }
      localStorage.setItem('theme', theme);
      // Update map tiles
      if (window.tileLayer) {
        const isDark = theme !== 'light';
        window.tileLayer.setUrl(isDark
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
          : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
        );
      }
    }

    function toggleTheme() {
      const isLight = document.documentElement.classList.contains('light');
      applyTheme(isLight ? 'dark' : 'light');
    }

    // Auto-detect on load
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        applyTheme(saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        applyTheme('light');
      }
    })();

    // ─── INIT ────────────────────────────────────────────────
    function init() {
      renderDayTabs();
      renderCards();
      addLegend();

      PROCESSIONS.forEach(proc => {
        // Use baked route if available, else fallback to waypoints
        const routeCoords = BAKED.routes[proc.id] || proc.waypoints;
        const layer = drawRoute(proc, routeCoords);
        layer.addTo(map);
        routeLayers[proc.id] = layer;

        // Church marker at first checkpoint or waypoint
        const cp = BAKED.checkpoints[proc.id];
        const churchPos = cp?.points?.[0] || proc.waypoints[0];
        const marker = L.marker(churchPos, { icon: createChurchIcon(proc.color) });
        marker.bindPopup(getPopupContent(proc), { maxWidth: 280 });
        marker.on('click', () => selectProcession(proc.id));
        marker.addTo(map);
        markerLayers[proc.id] = marker;

        // Checkpoints from baked data
        if (cp && cp.points && cp.points.length > 0) {
          proc._computedWaypoints = cp.points;
          proc._computedNames = cp.names;
          checkpointLayers[proc.id] = drawComputedCheckpoints(proc);
        } else {
          checkpointLayers[proc.id] = drawCheckpoints(proc);
        }
      });

      document.getElementById('loading').classList.add('hidden');
      updateDisplay();
    }

    init();
  </script>
</body>
</html>
